<div class="consistency-anchor-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>一致性锚 (Consistency Anchor)</b>
            <span class="inline-drawer-icon fa-solid fa-circle-chevron-down"></span>
        </div>
        <div class="inline-drawer-content" style="padding: 10px;">
            <label class="checkbox_label">
                <input type="checkbox" id="ca-enable" checked>
                <span>启用一致性锚</span>
            </label>
            <hr>
            <div class="flex-container flexFlowColumn">
                <label>锚点注入频率（每 N 轮）</label>
                <input id="ca-frequency" type="number" min="1" max="50" value="3" style="width:80px;">
            </div>
            <div class="flex-container flexFlowColumn marginTop10">
                <label>记忆池最大 Token 数</label>
                <input id="ca-memory-tokens" type="number" min="50" max="500" value="200" style="width:80px;">
            </div>
            <div class="flex-container flexFlowColumn marginTop10">
                <label>重复检测缓存条数</label>
                <input id="ca-rep-count" type="number" min="2" max="20" value="5" style="width:80px;">
            </div>
            <div class="flex-container flexFlowColumn marginTop10">
                <label>重复相似度阈值 (0~1)</label>
                <input id="ca-rep-threshold" type="number" min="0.5" max="1" step="0.05" value="0.7" style="width:80px;">
            </div>
            <hr>
            <label class="checkbox_label">
                <input type="checkbox" id="ca-format-autofix" checked>
                <span>自动修复格式轻微偏差</span>
            </label>
            <label class="checkbox_label">
                <input type="checkbox" id="ca-format-strict" checked>
                <span>严格格式检查</span>
            </label>
            <label class="checkbox_label">
                <input type="checkbox" id="ca-thought-leak" checked>
                <span>思维链防火墙</span>
            </label>
            <label class="checkbox_label">
                <input type="checkbox" id="ca-debug-mode">
                <span>调试日志</span>
            </label>
        </div>
    </div>
</div>
<script>
    (function() {
        const ext = window.consistencyAnchor;
        if (!ext) return setTimeout(arguments.callee, 200);

        const settings = ext.settings;
        const el = {
            enable: document.getElementById('ca-enable'),
            freq: document.getElementById('ca-frequency'),
            memTokens: document.getElementById('ca-memory-tokens'),
            repCount: document.getElementById('ca-rep-count'),
            repThresh: document.getElementById('ca-rep-threshold'),
            autoFix: document.getElementById('ca-format-autofix'),
            strict: document.getElementById('ca-format-strict'),
            thought: document.getElementById('ca-thought-leak'),
            debug: document.getElementById('ca-debug-mode')
        };

        // 初始化 UI 值
        el.enable.checked = settings.enabled;
        el.freq.value = settings.anchorFrequency;
        el.memTokens.value = settings.memoryPoolMaxTokens;
        el.repCount.value = settings.repetitionCheckCount;
        el.repThresh.value = settings.repetitionThreshold;
        el.autoFix.checked = settings.formatAutoFix;
        el.strict.checked = settings.strictFormatCheck;
        el.thought.checked = settings.thoughtLeakIntercept;
        el.debug.checked = settings.debugMode;

        function sync() {
            settings.enabled = el.enable.checked;
            settings.anchorFrequency = parseInt(el.freq.value) || 3;
            settings.memoryPoolMaxTokens = parseInt(el.memTokens.value) || 200;
            settings.repetitionCheckCount = parseInt(el.repCount.value) || 5;
            settings.repetitionThreshold = parseFloat(el.repThresh.value) || 0.7;
            settings.formatAutoFix = el.autoFix.checked;
            settings.strictFormatCheck = el.strict.checked;
            settings.thoughtLeakIntercept = el.thought.checked;
            settings.debugMode = el.debug.checked;

            ext.toggleEnabled(settings.enabled);

            const ctx = window.SillyTavern.getContext();
            ctx.extensionSettings['consistency-anchor'] = settings;
            window.saveSettingsDebounced();
        }

        Object.values(el).forEach(e => e.addEventListener('change', sync));
    })();
</script>
